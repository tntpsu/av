# Hairpin track overlay — merges on top of config/av_stack_config.yaml at runtime.
#
# Only parameters that differ from base are listed here.
# Track: hairpin_15 (R15 turn, κ≈0.067, peak speed ~4.0 m/s under 0.20g cap)
# Usage:
#   ./start_av_stack.sh --build-unity-player --skip-unity-build-if-clean \
#       --config config/mpc_hairpin.yaml --track-yaml tracks/hairpin_15.yml --duration 60
#
# NOTE: MPC does NOT activate on hairpin_15 (cap-tracked speed 2-4 m/s, below 10 m/s threshold).
#   Stanley IS expected to activate (speed drops below 4.5 m/s at turn entry).
#   Score cap at 79/100 is from Trajectory yellow layer (P95=0.73m > 0.40m limit).
#   Breaking 79 requires preview-based trajectory planning (MPC through entire C1→C2 sequence).

# ── Remaining overlay keys (future task: auto-derive from track geometry) ──
# stanley_k: could auto-scale with κ_max (higher curvature → higher gain)
# stanley_max_speed_mps: could derive from cap speed + margin
# curve_cap_peak_lat_accel_g: could unify with mixed_radius auto-derive logic

control:
  regime:
    mpc_min_speed_mps: 10.0            # Step 4: disable MPC on hairpin (speeds 2-4 m/s, tight curves)
    stanley_max_speed_mps: 6.0         # Higher threshold on hairpin: cap speed ~4.0 m/s → always Stanley in turn
  lateral:
    stanley_k: 3.0                     # Validated: 1.5→3.0 cuts RMSE 0.46→0.30m (34% improvement, score 59→79)

trajectory:
  speed_governor:
    curve_cap_peak_lat_accel_g: 0.20   # keep R15 under 4.4 m/s (base 0.26 → 5.5 m/s → too fast for Stanley)
