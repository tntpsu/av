# Hill highway track overlay — Option A
#
# Run with:
#   ./start_av_stack.sh --track-yaml tracks/hill_highway.yml --duration 120
#
# Kinematic model + L_eff feedforward + IMU yaw rate for state estimation.
# No per-track tuning — all params auto-derived from base config + track geometry.

trajectory:
  mpc:
    mpc_dynamic_model_enabled: false
    mpc_leff_estimation_enabled: true
    mpc_tire_ekf_enabled: false
    mpc_tire_ekf_use_imu_yaw_rate: true
