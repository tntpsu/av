# S2-M4 — Highway 15 m/s validation config
#
# Base: config/av_stack_config.yaml
# Track: highway_65
# Changes from base (13 values):
#   control.longitudinal.target_speed:                  12.0 → 15.0
#   control.longitudinal.max_speed:                     12.0 → 18.0  (headroom; actual limit = safety.max_speed)
#   trajectory.target_speed:                            12.0 → 15.0
#   trajectory.speed_planner.accel_speed_max:           12.0 → 15.0
#   trajectory.speed_planner.decel_speed_max:           12.0 → 15.0
#   trajectory.reference_lookahead_speed_table:         added 15.0 m/s → 17.0 m entry
#   safety.max_speed:                                   12.0 → 15.0
#   trajectory.speed_governor.curve_cap_shadow_mode:    false → true
#     Reason: highway_65 is a completely straight road (GT curvature = 0.000).
#     Perception polynomial on a straight road produces noise that hits the
#     curve_feedforward_curvature_clamp (0.04), saturating curve_intent=1.0 and
#     preview_curvature=0.04 for 100% of frames. This creates a spurious ~5.7 m/s
#     commit cap via curvature_calibration_scale=2.5. Shadow mode makes the cap
#     advisory-only so it doesn't enforce speed.
#   trajectory.speed_governor.curve_preview_enabled:    true → false
#     Reason: the preview governor uses the same perception-derived preview_curvature,
#     which is also ~0.04 noise on highway_65. With curve_preview_min_curvature=0.002,
#     the preview fires on almost every frame and pre-brakes to ~7 m/s periodically
#     (visible spikes at t≈14.7 s and t≈36 s in shadow-mode run). On a straight
#     highway the preview should never fire; disabling it prevents spurious braking.
#   control.longitudinal.max_speed:                     15.0 → 18.0
#     Reason: pid_controller progressive throttle reduction fires at 0.80 × max_speed.
#     With max_speed=15, reduction starts at 12.0 m/s (80%), leaving the car at only
#     20% throttle from 12→15 m/s. With max_speed=18, the 80% threshold shifts to
#     14.4 m/s, giving 40% throttle all through 12.0–14.4 m/s so the car can
#     actually push through to 15 m/s. The real ceiling is safety.max_speed=15.0
#     (+ overspeed brake at target+0.4); raising this field adds headroom only.
#
# Usage:
#   ./start_av_stack.sh --config config/highway_15mps.yaml \
#       --launch-unity --unity-auto-play --duration 60
#
# Do NOT change comfort gate thresholds here — let the A/B gate report
# which metrics fail first. Tune only after seeing gate output.

control:
  lateral:
    kp: 1.1
    ki: 0.004
    kd: 0.18
    max_steering: 0.7
    deadband: 0.05
    heading_weight: 0.5
    lateral_weight: 0.5
    error_clip: 1.57
    integral_limit: 0.1
    steering_smoothing_alpha: 0.3   # CHANGED: 0.9 → 0.3 (α=0.9 gives τ=0.31s → 10.5° phase lag at 0.09 Hz oscillation; combined with PP transport delay this pushes total lag past 45°; α=0.3 gives τ=0.028s → <1° lag, lets PP reverse direction immediately)
    control_mode: pure_pursuit
    stanley_k: 1.5
    stanley_soft_speed: 2.0
    stanley_heading_weight: 1.0
    pp_feedback_gain: 0.0           # CHANGED: 0.1 → 0.0 (PID integral winds up during geometric PP oscillation, providing growing correction that amplifies amplitude; pure geometric PP for highway straight-line test)
    curve_feedforward_gain: 0.0     # CHANGED: 1.0 → 0.0 (curve feedforward on straight highway amplifies oscillation: noise curvature 0.04 × sign(heading_error) creates positive feedback that grows heading weave at 14 m/s; disable entirely on straight track)
    pp_max_steering_jerk: 18.0
    pp_curve_local_lookahead_floor_enabled: true
    pp_curve_local_lookahead_floor_speed_table:
    - speed_mps: 0.0
      lookahead_m: 4.0
    - speed_mps: 4.5
      lookahead_m: 4.4
    - speed_mps: 6.5
