# Highway + inter-frame control extrapolation overlay.
# Inherits everything from mpc_highway.yaml via deep merge,
# then enables inter-frame at 30 Hz between camera frames.
#
# Usage:
#   ./start_av_stack.sh --build-unity-player --skip-unity-build-if-clean \
#       --config config/mpc_highway_interframe.yaml \
#       --track-yaml tracks/highway_65.yml --duration 100

# Pull in the full highway overlay first (load_config merges base → this)
# NOTE: This file IS the overlay. It must contain all highway keys plus interframe.
# Since load_config only merges base + one overlay, we duplicate the highway
# regime/MPC keys here. A cleaner approach would be multi-overlay support,
# but for now this is a test-only config.

control:
  regime:
    enabled: true
    mpc_min_speed_mps: 3.0
  interframe_extrapolation:
    enabled: true
    max_interframe_updates: 3
    min_interframe_dt_s: 0.025
    stale_vehicle_state_ms: 50.0
    regime_gate: "mpc_only"

trajectory:
  target_speed: 15.0
  lookahead_distance: 40.0
  reference_lookahead: 15.0
  curve_auto_derive: true
  curve_feedforward_mode: "map"
  curve_scheduler_mode: "phase_active"
  curve_intent_enabled: true
  speed_governor_enabled: true
  mpc:
    mpc_horizon: 20
    mpc_dt: 0.05
    mpc_q_lat: 0.5
    mpc_q_heading: 0.2
    mpc_q_steer: 0.1
    mpc_r_steer: 0.5
    mpc_r_steer_rate: 2.0
    mpc_q_lat_terminal_scale: 1.0
    mpc_v_max: 20.0
    mpc_bias_enabled: true
    mpc_bias_alpha: 0.005
    mpc_bias_kappa_gain: 0.015
    mpc_bias_max_correction: 0.002
    mpc_bias_min_speed: 5.0
    bias_active_curve_preserve_dynamic_enabled: true
    bias_active_curve_preserve_speed_on: 13.0
    bias_active_curve_preserve_speed_full: 15.0
    bias_active_curve_preserve_curvature_on: 0.0015
    bias_active_curve_preserve_curvature_full: 0.0020
    bias_active_curve_preserve_full_ratio: 1.0
    bias_active_curve_same_sign_guard_ratio: 0.25
    mpc_r_steer_rate_scheduling_enabled: true
    smith_predictor_max_delay_s: 0.080

safety:
  max_speed: 15.0
