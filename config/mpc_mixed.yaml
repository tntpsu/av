# Mixed-radius track overlay — merges on top of config/av_stack_config.yaml at runtime.
#
# Only parameters that differ from base are listed here.
# Track: mixed_radius (R40–R200 circuit, κ range 0.005–0.025)
# Speed range: 5–12 m/s (cap-tracked on tight corners, MPC on fast straights)
# Usage:
#   ./start_av_stack.sh --config config/mpc_mixed.yaml \
#       --track-yaml tracks/mixed_radius.yml --duration 60
#
# NOTE: This track exercises the full PP↔MPC regime transition range.
#   R40 corner:  cap speed ~8.85 m/s (0.20g), κ×v²=1.89 → PP (exceeds 1.5 lateral accel budget)
#   R60 corner:  cap speed ~8.9 m/s, κ×v²=1.33 → MPC (within budget)
#   R150 corner: target-speed limited to 12 m/s, κ×v²=0.87 → MPC active
#   R200 corner + straights: 12 m/s, κ×v²=0.65 → MPC active
#   curve_cap_peak_lat_accel_g: 0.20 keeps R40 under cap speed.

# ── Remaining overlay keys (future task: auto-derive from track geometry) ──
# commit_distance_ready_m: approach-length dependent; could derive from min straight segment length
# curve_preview_enabled/curve_cap_use_preview_curvature: could auto-set when map curvature available
# curve_cap_peak_lat_accel_g: could unify with hairpin auto-derive logic
# MPC weights (q_lat, r_steer_rate): could auto-derive from κ_max (low κ → soft q_lat)
# max_speed: could derive from track speed_limit_mph

control:
  longitudinal:
    max_speed: 14.0                    # headroom above target (base: 12.0)
  # regime: no per-track overrides — lateral accel budget handles R40 PP↔MPC automatically

trajectory:
  curve_local_commit_distance_ready_m: 8.0  # track-specific (base: 3.0); mixed_radius approach geometry supports early COMMIT
  speed_governor:
    curve_preview_enabled: false             # use map κ for cap (avoids noise)
    curve_cap_use_preview_curvature: false
    curve_cap_peak_lat_accel_g: 0.20         # tighter cap keeps R40 (κ=0.025) in PP regime
  # mpc q_lat (0.5) and r_steer_rate (2.0) now in base config — no overlay needed
