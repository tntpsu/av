# Mixed-radius track overlay — merges on top of config/av_stack_config.yaml at runtime.
#
# Only parameters that differ from base are listed here.
# Base provides all other defaults (speed tables, curvature thresholds, MPC structure).
#
# Track: mixed_radius (R40–R200 circuit, κ range 0.005–0.025)
# Speed range: 5–12 m/s (cap-tracked on tight corners, MPC on fast straights)
# Usage:
#   ./start_av_stack.sh --config config/mpc_mixed.yaml \
#       --track-yaml tracks/mixed_radius.yml --duration 60
#
# NOTE: This track exercises the full PP↔MPC regime transition range.
#   R40 corner:  cap speed ~8.85 m/s (0.20g) → PP only (below 9.5 m/s hysteresis threshold)
#   R60 corner:  cap speed ~10.8 m/s (0.20g) → PP (below MPC threshold at entry speed)
#   R150 corner: target-speed limited to 12 m/s → MPC active
#   R200 corner + straights: 12 m/s → MPC active
#
#   curve_cap_peak_lat_accel_g: 0.20 (lowered from 0.26) keeps R40 in PP regime.
#   With 0.26g, R40 cap was 10.1 m/s — above the 9.5 m/s MPC downshift threshold,
#   causing MPC to run through R40 at κ=0.025 (8× its highway design point) → oscillation.
#   MPC threshold (pp_max_speed_mps: 10.0) is intentionally NOT lowered — the handoff
#   at R150 is the key scenario under test.

control:
  longitudinal:
    target_speed: 12.0          # moderate — not full highway speed
    max_speed: 14.0
  regime:
    enabled: true

trajectory:
  target_speed: 12.0
  # Use phase_active scheduler for the tight corners (R40, R60) — same as s_loop.
  # Without this, tight corners default to binary mode which doesn't contract lookahead
  # aggressively enough at high lateral error, causing overshoot on R40.
  # curve_scheduler_mode, phase_distance_start_m, and reference_lookahead_speed_table_entry
  # promoted to base config (2026-03-13).
  # commit_distance_ready_m stays track-specific (see mpc_sloop.yaml note).
  reference_lookahead_entry_track_name: mixed_radius  # auto-derived from --track-yaml; explicit for clarity
  curve_local_commit_distance_ready_m: 8.0  # track-specific (base: 3.0); mixed_radius approach geometry supports early COMMIT
  speed_governor:
    curve_preview_enabled: false  # use map κ for cap (avoids noise)
    curve_cap_use_preview_curvature: false
    curve_cap_peak_lat_accel_g: 0.20  # tighter cap keeps R40 (κ=0.025) in PP regime
                                       # R40 cap: sqrt(0.20×9.8/0.025) = 8.85 m/s < 9.5 threshold
  mpc:
    mpc_q_lat: 0.5            # Match highway-validated setting (base: 10.0). Higher q_lat causes
                               # active hunting on moderate curves (κ=0.007) → e_lat P95 0.83-0.97m.
                               # Per plan.md: q_lat=0.5 r_rate=2.0 is optimal. Score cap at 79 is
                               # from Trajectory yellow (deductions >20 pts). Need P95 < 0.47m.
    mpc_r_steer_rate: 2.0     # Match highway-validated setting (base: 1.0). Stricter rate penalty
                               # damps oscillation on regime-transition frames.
  # mpc_delay_frames tested: 1 vs 2 — delay=1 halves Smith P95 (0.157→0.070m), RMSE 0.41→0.35m.
  # Score was pinned at 79 by trajectory yellow cap, not cadence. Keeping base default (2).
