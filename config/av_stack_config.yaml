  mpc:
    # Keys must match MPCParams field names prefixed with mpc_
    mpc_horizon: 20
    mpc_dt: 0.1                     # prediction step (2s horizon at 20 steps)
    mpc_wheelbase_m: 2.5
    mpc_feedforward_wheelbase_m: 3.65 # sysid-calibrated L_eff at ~10m/s (K_us=0.012, gain=0.684)
    mpc_max_steer_rad: 0.5236       # 30° — fallback when speed_dependent_steer disabled
    # Speed-dependent max steer angle (matches Unity CarController.cs lines 1398-1403)
    mpc_speed_dependent_steer_enabled: true
    mpc_max_steer_low_speed_rad: 0.5236    # 30° (Unity maxSteerAngleLowSpeed)
    mpc_max_steer_high_speed_rad: 0.2793   # 16° (Unity maxSteerAngleHighSpeed)
    mpc_max_steer_speed_saturation_mps: 12.0  # Unity maxSteerAngleFullSpeed
    mpc_q_lat: 1.0
    mpc_q_lat_rate: 0.0              # lateral velocity damping (0=disabled) — tuned via E2E validation
    mpc_q_heading: 10.0              # RAISED 5→10: provides phase lead — heading error (derivative of lateral) is penalised more heavily, preventing oscillation buildup
    mpc_q_speed: 2.0
    # r_steer: 10:1 cost ratio vs q_lat=0.5. Near-zero (0.0001) caused
    # oscillation at curve entries (no magnitude damping). 0.5 (old value)
    # caused systematic understeering. 0.05 is the middle ground: aggressive
    # enough to close ~0.4m curve offsets, stable enough to not oscillate.
    mpc_r_steer: 0.05
    mpc_r_accel: 0.2
    mpc_r_steer_rate: 2.0                           # CHANGED: 3.5 → 2.0 (q_heading=10 now provides phase-lead oscillation damping; r_steer_rate=3.5 was over-damping, causing 0.46m steady-state offset in curves)
    # Speed-dependent r_steer_rate scheduling: scales r_steer_rate with speed
    # to counteract bicycle model v/L gain increase. r_eff = r_base * min(1 + gain*(v-onset), max_scale).
    mpc_r_steer_rate_scheduling_enabled: true
    mpc_r_steer_rate_speed_onset: 12.0      # m/s where scaling begins
    mpc_r_steer_rate_speed_gain: 0.80       # multiplier per m/s above onset (0.40→growth halved but still positive)
    mpc_r_steer_rate_max_scale: 3.0         # cap: r_eff ≤ r_base × max_scale
    mpc_r_steer_rate_band_hysteresis: 1.0   # m/s hysteresis to prevent solver rebuild chattering
    mpc_r_steer_rate_kappa_off: 0.005      # curvature where scheduling fully deactivates (R200=0.005; R600/R500 keep scheduling)
    # Curvature-adaptive r_steer_rate reduction for straight-line phase margin.
    # On low-κ sections, reduce r_steer_rate so MPC corrects drift faster.
    # r_eff *= max(min_scale, κ/kappa_on).  On curves (κ >= kappa_on), scale=1.0 (no change).
    mpc_r_steer_rate_straight_damping_enabled: false  # disabled: lowering r_steer_rate alone increases overshoot; see q_heading approach
    mpc_r_steer_rate_straight_kappa_on: 0.002
    mpc_r_steer_rate_straight_min_scale: 0.3
    mpc_delta_rate_max: 0.15        # max Δδ_norm per step
    # Noise-jitter fixes (2026-02-17):
    # Fix A — first-step QP rate cost: adds 0.5*r_steer_rate*(delta[0]-last)^2 to the
    #   objective so r_steer_rate is symmetric across ALL steps, not just within-horizon.
    #   Kept: reduced max jerk 0.150→0.052 with no lateral RMSE regression.
    mpc_first_step_rate_enabled: true
    # Fix B — EMA pre-filter + deadband on e_lat: DISABLED after run analysis (2026-03-21).
    #   In simulation, α=0.3 reduced sign-flip jitter 67%. In Unity, sign flips were already
    #   only 3.7% (perception noise is slow/correlated, not white noise). The EMA added ~7
    #   frames of lag to curve-entry corrections, increasing curve e_lat RMSE by +81%
    #   (0.22m→0.40m) and dropping score 92.3→91.7. Alpha=1.0 = no filtering (unfiltered).
    # MPC reference alignment: use lookahead GT cross-track for e_lat instead of at-car.
    # Aligns MPC's optimization target with the scored lateral_error (lookahead reference).
    # At-car reference diverges from scored reference on curves (std=0.10m on R200).
    mpc_e_lat_use_lookahead_reference: true
    mpc_elat_ema_alpha: 1.0
    mpc_elat_deadband_m: 0.0
    # Fix C — dropout recovery rate limiter: DISABLED (2026-03-31).
    #   Was 0.05 m/frame to absorb perception dropout recovery jerk.
    #   Root cause analysis revealed MPC uses GT cross-track (not perception) for e_lat,
    #   so dropout recovery jumps don't occur. The 0.05 cap caused a self-sustaining
    #   limit cycle: physical oscillation at 0.10-0.15 m/frame exceeded the ramp,
    #   MPC saw 4-17% of true error, phase-lagged correction amplified oscillation.
    #   H2 RMSE regressed 0.12→0.41m with ramp active. Disabled to restore stability.
    mpc_elat_ramp_rate_m_per_frame: 0.0
    mpc_max_accel: 3.0
    mpc_max_decel: 4.0
    mpc_v_min: 1.0
    mpc_v_max: 15.0
    mpc_max_consecutive_failures: 5
    mpc_max_solve_time_ms: 8.0
    mpc_speed_adaptive_horizon: false
    mpc_curvature_preview_enabled: true
    mpc_curvature_preview_gain: 1.0
    # bias_correction was a workaround for r_steer=0.5 causing systematic
    # understeering. With r_steer=0.05 the QP has enough correction authority
    # on its own. Leaving bias_enabled=True would fight the direct feedback
    # by slowly reducing kappa when e_lat persists, creating a new equilibrium.
    mpc_bias_enabled: false
    mpc_bias_relative_guard_min_kappa: 0.0005  # lowered from 0.001: ACC highway κ≈0.0009 must trigger guard
    mpc_bias_ema_abs_max: 0.5                  # absolute clamp on bias EMA accumulator (meters)
    mpc_max_steering_rate_per_frame: 0.15  # safety net rate limiter (rad/frame) — much looser than PP
    mpc_delay_frames: 2                    # Smith predictor delay buffer length (frames; ~66ms at 30fps)
    smith_predictor_max_delay_s: 0.080      # Wall-clock cap on Smith predictor delay (prevents 4x overshoot at low camera rates; 0=disabled)
    smith_predictor_disagreement_gain: 0.3  # Attenuate heading correction when sign(e_lat) != sign(e_heading) (oscillation inflection)
    mpc_grade_clamp_rad: 0.15             # Max grade input to MPC (~8.5°)
    mpc_grade_ff_gain: 1.8                # Unity WheelCollider physics calibration
    # ── Online effective wheelbase estimation (RLS) ────────────────────────────
    mpc_leff_estimation_enabled: false    # off — RLS unstable on curve transitions (κ=0 but heading changing); needs model fix first
    mpc_leff_forgetting_factor: 0.995     # λ — exponential forgetting (~200-frame window)
    mpc_leff_initial_P: 100.0             # initial RLS covariance (high → fast initial learning)
    mpc_leff_min_speed_mps: 3.0           # only update when v > this (low-speed kinematics unreliable)
    mpc_leff_min_excitation: 0.01         # min |v·δ·δ_max·dt| per frame to trigger RLS update
    mpc_leff_bounds_min: 1.5              # hard safety clamp — never go below 1.5m
    mpc_leff_bounds_max: 8.0              # hard safety clamp — never go above 8.0m
  # ── Dynamic bicycle model ──────────────────────────────────────────────────
    mpc_dynamic_model_enabled: false        # dynamic model regressed (v_y noise); kinematic + calibrated FF
    mpc_vehicle_mass_kg: 1500.0
    mpc_vehicle_iz_kgm2: 1250.0
    mpc_vehicle_lf_m: 1.125
    mpc_vehicle_lr_m: 1.125
    mpc_tire_cf_nominal: 29000.0           # from steady-state sysid (L_eff=3.65m @ 10m/s)
    mpc_tire_cr_nominal: 52000.0           # C_r/C_f ratio ~1.8 from offline sysid
    mpc_q_vy: 0.5
    mpc_q_yawrate: 1.0
  # ── EKF tire cornering stiffness estimation ────────────────────────────────
    mpc_tire_ekf_enabled: false
    mpc_tire_ekf_process_noise: 100.0
    mpc_tire_ekf_measurement_noise: 0.01
    mpc_tire_ekf_min_speed_mps: 5.0
    mpc_tire_ekf_cf_min: 15000.0
    mpc_tire_ekf_cf_max: 80000.0
    mpc_tire_ekf_cr_min: 15000.0
    mpc_tire_ekf_cr_max: 80000.0
    mpc_tire_ekf_innovation_divergence_threshold: 0.15
    mpc_tire_ekf_slip_saturation_rad: 0.15
    mpc_tire_ekf_use_imu_yaw_rate: true
    mpc_tire_ekf_imu_yaw_rate_r: 0.001
  # ── NMPC (Step 5) ────────────────────────────────────────────────────────────
  # Nonlinear MPC using full bicycle kinematics (sin/tan, no small-angle approximation).
  # Activates when regime == NONLINEAR_MPC (speed > lmpc_max_speed_mps or
  # |heading_error| > lmpc_max_heading_error_rad). Solved via scipy SLSQP;
  # warm-started from previous solution for sub-10ms typical solve time.
  # All keys use nmpc_ prefix to distinguish from LMPC (mpc_) params.
  nmpc:
    nmpc_enabled: false             # opt-in — enable via per-track overlay (e.g. mpc_autobahn.yaml)
    nmpc_horizon: 20                # N prediction steps
    nmpc_dt: 0.1                   # prediction step duration (s) — matches LMPC dt
    nmpc_q_lat: 0.7                # lateral error weight — BASE; auto-derived from v²κ when curve_auto_derive:true (0.7@15m/s/κ0.002 → ~1.94@25m/s)
    nmpc_q_heading: 5.0            # heading error weight
    nmpc_r_steer: 1.0e-4           # steering magnitude cost (near-zero — same philosophy as LMPC)
    nmpc_r_steer_rate: 1.5         # steering rate cost — PRIMARY comfort knob for NMPC
    nmpc_q_lat_terminal_scale: 3.0 # terminal state lateral weight multiplier
    nmpc_q_heading_terminal_scale: 3.0
    nmpc_delta_rate_max: 0.5       # max normalised steering change per step
    nmpc_max_accel: 3.0            # m/s²
    nmpc_max_decel: 4.0            # m/s²
    nmpc_v_min: 1.0                # m/s
    nmpc_v_max: 35.0               # m/s (covers full NMPC speed envelope)
    nmpc_max_solve_ms: 20.0        # solver time budget; fallback to LMPC if exceeded
    nmpc_max_iter: 50              # SLSQP max iterations per frame
    nmpc_ftol: 1.0e-4              # SLSQP function value tolerance
    nmpc_fallback_lmpc: true       # true=fall back to LMPC on failure; false=fall back to PP
    nmpc_warmup_frames: 5          # frames to relax rate constraint after activation
    nmpc_grade_ff_gain: 1.8        # grade feedforward gain (matches LMPC)
safety:
  max_speed: 14.0                     # Safety ceiling (headroom above target_speed=12.0)
  emergency_brake_threshold: 1.5
  speed_prevention_threshold: 0.9
  speed_prevention_brake_threshold: 0.95
  speed_prevention_brake_amount: 0.2
  max_lateral_error: 2.0
  recovery_lateral_error: 1.0
  emergency_stop_error: 4.0
  emergency_stop_release_speed: 0.2
  emergency_stop_end_run_after_seconds: 3.0
  emergency_stop_use_gt_lane_boundaries: true
  emergency_stop_gt_lane_boundary_margin: 0.05
  lane_width: 7.0
  car_width: 1.9
  allowed_outside_lane: 1.0
  teleport_distance_threshold: 2.0
  teleport_guard_frames: 1
  post_jump_cooldown_frames: 30
  post_jump_speed_scale: 0.5
  post_jump_steering_scale: 0.6
  teleport_expected_motion_ratio_threshold: 1.8
  teleport_expected_motion_margin_m: 0.75
  teleport_hard_override_distance_m: 8.0
  teleport_hard_override_ratio_threshold: 4.0
  teleport_continuity_skip_frames_threshold: 3
  teleport_continuity_warn_age_ms: 125.0
logging:
  frame_log_interval: 30
  log_lateral_error: true
  log_reference_point: true
# Python main loop + bridge transport (see docs/plans/perf_pareto_plan_a_bridge_gpu_topdown.md)
stack:
  # Match Unity CameraCapture.targetFPS (CarPrefab + CameraCapture.cs default).
  # 13 Hz: aligned with sustained consumer throughput (queue was pinned at 15 Hz target).
  target_loop_hz: 13.0
  # Use GET /api/camera/latest/raw (no JPEG round-trip). Set false for legacy bridge only.
  use_raw_camera_transport: true
  # Bridge FIFO depth per camera (freshness vs buffering). start_av_stack.sh exports AV_BRIDGE_MAX_CAMERA_QUEUE from this.
  bridge_max_camera_queue: 48
  # POST /api/camera/drain_queue once at stack start to shed backlog (latest snapshot unchanged).
  clear_bridge_camera_queue_on_start: true
  # Background thread GETs latest front camera while the stack runs perception/control (overlap I/O).
  camera_prefetch: true
  # Closed-loop remains on latest camera + latest vehicle. Shadow packet path records continuity only.
  sync_packet_mode: packet_shadow
  # When active FIFO packet ingest cannot align a required component, explicitly label and
  # fall back to the legacy latest-path ingest instead of silently masquerading as continuity.
  sync_packet_active_allow_legacy_fallback: true
  # Deprecated metadata-only active resync knob. Kept for compatibility while active payload ingest evolves.
  sync_packet_active_resync_max_discards: 8
  # Active coherent-packet consume policy. Debug alternatives:
  #   fifo_strict, latest_debug
  sync_packet_consume_policy: freshest_within_budget
  # Hard freshness budget for the selected coherent payload.
  sync_packet_payload_max_age_ms: 250.0
  # Soft warning budget for selected coherent payload age.
  sync_packet_payload_warn_age_ms: 125.0
  # Max number of queued payload packets to drain while selecting the freshest packet.
  sync_packet_payload_max_drain_count: 128
  # Only for debug-only latest_debug mode; never enable for promoted closed-loop paths.
  sync_packet_payload_allow_stale_debug: false
  # POST /api/trajectory from a background thread (latest-wins) so the main loop is not blocked.
  async_trajectory_transport: true
  # Overlap GET vehicle/state with camera fetch (separate requests.Session on worker thread).
  parallel_vehicle_state_fetch: true
  # If true, requests uses OS/env proxy settings for the Unity bridge (rare). Default false
  # skips macOS System Configuration proxy resolution on every localhost call (faster).
  bridge_trust_proxy_env: false
  # Top-down for HDF5: 1=every frame, N=every Nth recorded frame, 0=never fetch.
  # Extra bridge GET+decode each tick; increase if chasing higher control Hz.
  topdown_recording_interval_frames: 3
perception:
  use_gpu: true
  # Apple Silicon: use MPS when CUDA is unavailable (requires PyTorch with MPS build).
  prefer_mps: true
  # Segmentation U-Net resize target [height, width] before inference. Default was [320, 640].
  # [256, 512] is a conservative downscale (512×256) for cadence; validate on oval/s_loop.
  segmentation_input_size: [256, 512]
  record_segmentation_mask: false
  low_visibility_fallback_enabled: true
  low_visibility_fallback_blend_alpha: 0.35
  low_visibility_fallback_max_consecutive_frames: 8
  low_visibility_fallback_center_shift_cap_m: 0.25
  segmentation_fit_min_row_ratio: 0.20
  segmentation_fit_max_row_ratio: 0.80
  segmentation_ransac_enabled: true
  segmentation_ransac_residual_px: 10.0
  segmentation_ransac_min_inliers: 8
  segmentation_ransac_max_trials: 100
  model_fallback_confidence_hard_threshold: 0.1
  model_fallback_zero_lane_confidence_threshold: 0.6
  lane_width_min_m: 1.0
  lane_width_max_m: 10.0
  lane_center_change_clamp_m: 0.4
  lane_width_change_clamp_m: 0.5
  lane_line_change_clamp_m: 0.25
  lane_side_sign_enforce: true
  lane_side_sign_min_abs_m: 0.25
  lane_side_sign_skip_curve_phase: true
  lane_side_sign_curve_curvature_min: 0.006
  lane_side_sign_preview_curvature_min: 0.006
  lane_center_ema_alpha: 0.15
  lane_width_ema_alpha: 0.2
  lane_center_gate_m: 0.3
  lane_width_gate_m: 0.6
  lane_center_ab_beta: 0.12
  lane_width_ab_beta: 0.08
lateral_control:
  heading_weight: 0.5
  lateral_weight: 0.5
  steering_smoothing_alpha: 0.7
  steering_rate_scale_min: 0.8
  steering_jerk_limit: 0.0

# ── ACC — Adaptive Cruise Control (Step 5) ──────────────────────────────────
acc:
  enabled: false            # Phase A: data pipeline only — set true when Unity radar bridge ready
  gap_alpha: 0.30           # EMA alpha for range filtering (lower = smoother)
  rate_alpha: 0.20          # EMA alpha for range-rate filtering
  # IDM parameters
  target_gap_time_headway_s: 1.5   # Desired time headway T (s)
  min_gap_s0_m: 2.0                # IDM minimum standstill gap s0 (m)
  idm_max_accel_mps2: 2.0          # IDM max acceleration a (m/s²)
  idm_comfortable_decel_mps2: 3.0  # IDM comfortable decel b (m/s²)
  # State machine parameters
  cutout_speed_mps: 5.0            # ACC disengages below this ego speed (m/s)
  fallback_frames: 5               # Consecutive no-detect frames before DETECTION_LOSS
  reengage_frames: 3               # Consecutive detected frames to re-arm from DETECTION_LOSS
  disengage_ramp_mps2: 2.0        # Speed ramp rate on disengage (m/s²)
  detection_range_m: 60.0          # Max radar detection range (m)
