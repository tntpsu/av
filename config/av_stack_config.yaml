  - speed_mps: 11.18
    target_distance_m: 6.2
  - speed_mps: 13.41
    target_distance_m: 6.7
  - speed_mps: 15.0
    target_distance_m: 7.2
  - speed_mps: 17.0
    target_distance_m: 7.7
  local_curve_reference_tight_distance_scale_min: 0.82
