control:
  # ── Inter-frame control extrapolation ──────────────────────────────────────
  # Decouples MPC control rate from camera delivery rate.
  # When enabled, fetches fresh GT vehicle state between camera frames and
  # runs lightweight MPC at ~30 Hz even when camera delivers at ~7.5 Hz.
  interframe_extrapolation:
    enabled: true                     # Validated on all tracks — decouples control rate from camera
    max_interframe_updates: 3         # Max inter-frame updates per camera cycle
    min_interframe_dt_s: 0.025        # Floor on inter-frame dt (prevents busy-spin)
    max_interframe_dt_s: 0.10         # Ceiling on inter-frame dt (prevents steering discontinuity)
    stale_vehicle_state_ms: 50.0      # Max GT age before skipping update
    max_e_lat_jump_m: 0.5             # Discontinuity guard threshold
    max_speed_change_mps: 3.0         # Speed discontinuity guard threshold
    recording_mode: "summary"         # "summary" = 1 HDF5 row/camera; "full" = every update
    regime_gate: "mpc_only"           # "mpc_only" = only during MPC regime; "all" = always
  lateral:
    kp: 1.1
    ki: 0.004
    kd: 0.18
    max_steering: 0.7
    deadband: 0.05
    heading_weight: 0.5
    lateral_weight: 0.5
    error_clip: 1.57
    integral_limit: 0.1
    steering_smoothing_alpha: 0.92
    # Hill / grade: stronger smoothing reduction under grade (reduces lateral chatter on hill_highway).
    # G6-L4: tune only with A/B on grade_lateral_v1 + pre-failure metrics — docs/GRADE_LATERAL_TUNING.md
    # 2026-03-22: 7.5 A/B vs 6.5 regressed overall score + oscillation; reverted to 6.5 (see GRADE_LATERAL_TUNING.md).
    grade_steering_damping_gain: 6.5    # Subtracted from lateral error smoothing alpha; scales with |grade| (rise/run)
    control_mode: pure_pursuit
    stanley_k: 1.5                 # base default; hairpin overlay sets 3.0 (validated 59→79)
    stanley_soft_speed: 2.0
    stanley_heading_weight: 1.0
    stanley_curvature_ff_enabled: false  # A/B tested on hairpin: no RMSE gain, 2× steer_jerk. Dead end for reactive control.
    stanley_ff_slew_rate_rad: 0.05       # Slew limiter for FF (rad/frame). Works mechanically, but FF itself is ineffective.
    # PP residual PID (hill_highway oscillation mitigation): slightly lower feedback vs error loop.
    # 2026-03-22: 0.070 A/B vs 0.075 failed promotion (see GRADE_LATERAL_TUNING.md); keep 0.075 until a gated win.
    pp_feedback_gain: 0.075
    pp_max_steering_jerk: 18.0
    # Steering motion profile planner (replaces rate clamp + jerk clamp + ceiling clip)
    # Unified trapezoidal profile with demand-aware tapering — no overshoot, no ceiling jerk.
    pp_steering_profile_enabled: true    # re-enabled with preview-aware reversal urgency (replaces rate+jerk+clip pipeline)
    pp_steering_max_rate_per_s: 5.2        # physical: 0.4/frame ÷ 0.077s/frame
    pp_steering_max_jerk_per_s2: 20.0      # must stay below scoring gate (18.0 norm/s²)
    pp_steering_taper_gain: 3.0            # rate = min(max_rate, gain × |error|)
    pp_steering_reversal_taper_factor: 0.7 # urgency=1.0 → taper drops to 30% of nominal
    pp_steering_reversal_curvature_min: 0.003  # |κ_preview| below this → no reversal detection
    pp_curve_local_lookahead_floor_enabled: true
    # 2026-03-22: Attempted lower floor (to 2.5-3.0m) to eliminate floor rescue — reverted.
    # Lowering the floor increased adj_rmse 0.297→0.349m and C3 peak error 0.465→0.809m.
    # The 5.2m floor during curves provides a stable PP operating point; the dynamic horizon
    # driving to 3.2m without the floor backstop creates oscillation.
    # Floor rescue is benign; the real issue is late turn-in (+13-15fr on C1/C3).
    pp_curve_local_lookahead_floor_speed_table:  # lowered at low speed (s_loop/hairpin 3-7 m/s)
    - speed_mps: 0.0
      lookahead_m: 2.5
    - speed_mps: 4.5
      lookahead_m: 3.0
    - speed_mps: 7.0
      lookahead_m: 3.5
    - speed_mps: 8.0
      lookahead_m: 5.2
    - speed_mps: 12.0
      lookahead_m: 5.6
    pp_curve_local_shorten_slew_m_per_frame: 0.15
    pp_curve_local_floor_state_min: ENTRY
    # Physics-based floor: Ld = max(sqrt(8R*e_target), k*speed, Ld_min)
    pp_curve_local_floor_formula_enabled: true
    pp_curve_local_floor_target_error_m: 0.04
    pp_curve_local_floor_speed_time_constant_s: 0.4
    pp_curve_local_floor_absolute_min_m: 2.0
    # Curvature-adaptive k: tight curves get shorter stability floor
    pp_curve_local_floor_k_reduction_factor: 0.6       # max 60% reduction at full severity
    pp_curve_local_floor_k_severity_kappa_min: 0.003   # severity starts ramping
    pp_curve_local_floor_k_severity_kappa_max: 0.015   # severity = 1.0
    pp_curve_local_floor_curvature_clamp: 0.001
    pp_min_lookahead: 0.5
    pp_speed_norm_enabled: false
    pp_speed_norm_reference_mps: 12.0
    pp_speed_norm_min_scale: 0.70
    pp_map_ff_enabled: true
    pp_map_ff_gain: 1.0                  # raised 0.8→1.0: proportional ramp replaces 1.8× step
    pp_map_ff_phase_gate_enabled: true   # now proportional: FF *= local_gate_weight (0→1 smoothstep)
    pp_map_ff_entry_boost: 1.8           # unused — proportional mode ignores this
    pp_map_ff_wheelbase_m: 2.5
    pp_map_ff_curvature_min: 0.005
    pp_map_ff_curvature_max_clip: 0.08
    pp_ref_jump_clamp: 0.5
    pp_stale_decay: 0.98
    # 2026-03-22: 0.38 A/B vs 0.4 did not promote (see GRADE_LATERAL_TUNING.md); keep 0.4 until gated win.
    pp_max_steering_rate: 0.4
    feedback_gain_min: 1.05
    feedback_gain_max: 1.25
    feedback_gain_curvature_min: 0.003
    feedback_gain_curvature_max: 0.03
    base_error_smoothing_alpha: 0.78
    heading_error_smoothing_alpha: 0.45
    straight_window_frames: 60
    straight_oscillation_high: 0.2
    straight_oscillation_low: 0.05
    curve_feedforward_gain: 1.0
