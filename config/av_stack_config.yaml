    stanley_upshift_hysteresis_mps: 0.5   # Must exceed 3.5 m/s to leave Stanley
    stanley_downshift_hysteresis_mps: 0.5 # Must drop below 2.5 m/s to enter Stanley
    stanley_blend_frames: 10           # 0.77s at 13 FPS — smooth low-speed transition
    stanley_min_hold_frames: 15        # 0.5s hold before switching
    # Do not hand off to Stanley when path curvature is clearly “on a curve”
    # (brief speed dip during C-braking was tripping Stanley at v<4.5 m/s with κ≈0.01,
    # causing MPC→Stanley + perception dropout jerk).  0.0 disables this guard.
    stanley_inhibit_curvature_abs: 0.004
    # LMPC → NMPC upshift thresholds (Step 5)
    lmpc_max_speed_mps: 20.0           # above this + upshift_hysteresis → NONLINEAR_MPC
    lmpc_max_heading_error_rad: 0.25   # large heading error → NONLINEAR_MPC (LMPC linearisation breaks)
trajectory:
  trajectory_source: planner
  # Lane midpoint coordinate conversion uses the full PP lookahead distance to evaluate
  # lane line positions. On short straights approaching tight curves, this lookahead can
  # reach into the upcoming curve, contaminating center_x with curvature-induced bias.
  # This parameter caps how far the evaluation point may extend into the upcoming curve
  # such that the resulting lateral error stays below the threshold (meters).
  # Formula: max_d_into_curve = sqrt(2 * threshold / kappa_preview)
  # At kappa=0.01 (sloop): caps at 3.16m into curve. At kappa=0.003 (gentle): 5.77m.
  # Set to 0 to disable. Default 0.05 matches the observed ~4cm baseline gap.
  lane_midpoint_max_curve_contamination_m: 0.05
  # Hard minimum for the clamped coord_conversion_distance (meters).
  lane_midpoint_clamp_min_distance_m: 3.0
  curve_auto_derive: true                # Phase 3: auto-derive curvature thresholds from track geometry
  curve_auto_derive_reference_kappa_max: 0.025  # base config calibrated for s_loop (κ_max=0.025)
  lookahead_distance: 20.0
  point_spacing: 1.0
  target_speed: 12.0
  reference_lookahead: 9.0
  dynamic_reference_lookahead: true
  curve_scheduler_mode: phase_active   # validated on s_loop + mixed_radius; highway unaffected (no curves)
  reference_lookahead_phase_active_entry_scale_min: 0.90
  reference_lookahead_phase_active_entry_scale_severity_on: 0.35
  reference_lookahead_phase_active_entry_scale_severity_full: 0.85
  reference_lookahead_phase_active_commit_phase_on: 0.75
  reference_lookahead_phase_active_commit_phase_full: 0.95
  reference_lookahead_speed_table:
