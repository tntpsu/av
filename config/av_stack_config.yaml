  regime:
    enabled: true
    # Lateral acceleration budget (replaces speed + curvature proxy logic)
    mpc_max_lateral_accel_mps2: 1.5     # κ×v² budget — MPC→PP when exceeded (m/s²)
    mpc_lateral_accel_hysteresis_mps2: 0.3  # dead band ± around threshold (m/s²)
    mpc_min_speed_absolute_mps: 2.0     # hard speed floor — MPC needs nonzero velocity (m/s)
    mpc_max_map_curvature: 0.015       # map κ above this → PP (MPC linearization degrades at R<67; was 0.020/R50)
