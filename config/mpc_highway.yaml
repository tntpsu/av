# Highway track overlay — merges on top of config/av_stack_config.yaml at runtime.
#
# Only parameters that differ from base are listed here.
# Base provides all other defaults (speed tables, safety gates, MPC structure).
#
# Track: highway_65 (500m arc radii — 10x gentler than s_loop's 40-50m arcs)
# Usage:
#   ./start_av_stack.sh --config config/mpc_highway.yaml \
#       --track-yaml tracks/highway_65.yml --duration 60
#
# NOTE: Curvature thresholds (curvature_min/max) are set ~5x lower than s_loop base
#   because highway arcs are κ=0.002 vs s_loop κ=0.02-0.025. Phase 3 will auto-derive
#   these from track geometry so they no longer need to be specified here.

control:
  lateral:
    steering_smoothing_alpha: 0.3   # fast response (base: 0.9 → too much phase lag at highway speed)
    pp_feedback_gain: 0.0           # pure geometric PP; PID integral amplifies oscillation at 15 m/s
    curve_feedforward_gain: 0.0     # noise curvature on straight highway creates positive feedback
    curve_feedforward_threshold: 0.0
    pp_speed_norm_enabled: true     # normalize PP gain by speed (disabled in base)
    pp_speed_norm_min_scale: 0.60   # quadratic floor: at 15 m/s scale=(12/15)²=0.64 (base: 0.7)
    pp_map_ff_gain: 1.0             # stronger map feedforward (base: 0.8)
    pp_map_ff_curvature_min: 0.001  # detect gentle highway arcs (base: 0.005)
    # Curve intent — calibrated for gentle highway geometry and higher speed
    curve_intent_startup_ignore_frames: 45
    curve_intent_arm_preview_min: 0.002
    curve_intent_arm_rise_min: 0.0002
    curve_intent_arm_distance_time_headway_s: 1.2
    curve_intent_arm_distance_min_m: 6.0
    curve_intent_arm_distance_max_m: 45.0
    curve_intent_rearm_exit_hysteresis: 2.0
    curve_intent_rearm_min_frames: 12
    curve_intent_max_commit_frames: 80
    curve_intent_force_straight_hold_frames: 24
  longitudinal:
    target_speed: 15.0
    max_speed: 18.0
    speed_drag_gain: 0.012          # lighter drag at highway speed (base: 0.035)
    accel_target_smoothing_alpha: 0.6   # more responsive (base: 0.86)
  regime:
    enabled: true

trajectory:
  target_speed: 15.0
  # Curvature thresholds — scaled for highway geometry (κ=0.002 vs s_loop κ=0.02-0.025)
  # TODO Phase 3: auto-derive from track arc radii; remove these overrides
  reference_lookahead_entry_preview_curvature_min: 0.0015   # base: 0.003
  reference_lookahead_entry_preview_curvature_max: 0.008    # base: 0.015
  reference_lookahead_entry_hysteresis_on: 0.0025
  reference_lookahead_entry_hysteresis_off: 0.0018
  curve_phase_preview_curvature_min: 0.0015   # base: 0.003
  curve_phase_preview_curvature_max: 0.008    # base: 0.015
  curve_phase_path_curvature_min: 0.0015      # base: 0.003
  curve_phase_path_curvature_max: 0.008       # base: 0.015
  curve_phase_rise_min: 0.0002
  curve_phase_rise_max: 0.003
  curve_phase_on: 0.35        # base: 0.45
  curve_phase_off: 0.22       # base: 0.30
  curve_phase_commit_on: 0.45 # base: 0.55
  curve_phase_commit_min_frames: 3
  curve_local_entry_severity_curvature_min: 0.0015   # base: 0.003
  curve_local_entry_severity_curvature_max: 0.008    # base: 0.012
  curve_local_entry_on_base: 0.35
  curve_local_entry_on_tight: 0.32
  curve_local_phase_time_start_s: 1.2
  curve_local_phase_time_start_tight_s: 1.6
  curve_context_curve_start_curvature: 0.0015   # base: 0.006
  speed_planner:
    accel_speed_max: 15.0
    decel_speed_max: 15.0
  speed_governor:
    curve_preview_enabled: false
    curve_cap_use_preview_curvature: false   # use map κ not perception preview (avoids noise capping)
  mpc:
    mpc_q_lat: 0.5             # softer lateral cost for gentle highway curves (base: 10.0)
    mpc_q_lat_terminal_scale: 1.0
    mpc_r_steer_rate: 2.0      # stricter rate penalty on straight highway (base: 1.0)
    mpc_v_max: 20.0
    mpc_bias_enabled: true
    mpc_bias_alpha: 0.005
    mpc_bias_kappa_gain: 0.015
    mpc_bias_max_correction: 0.002
    mpc_bias_min_speed: 5.0

safety:
  max_speed: 15.0

lateral_control:
  steering_smoothing_alpha: 0.3   # mirror of control.lateral above (dual registration in orchestrator)
