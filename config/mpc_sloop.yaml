# S-loop track overlay — merges on top of config/av_stack_config.yaml at runtime.
#
# Only parameters that differ from base are listed here.
# Base provides all other defaults (speed tables, curvature thresholds, safety, MPC params).
#
# Track: s_loop
# Usage:
#   ./start_av_stack.sh --config config/mpc_sloop.yaml \
#       --track-yaml tracks/s_loop.yml --duration 60
#
# NOTE: MPC does NOT activate on s_loop (cap-tracked speed 4-7 m/s, below 10 m/s threshold).
#   This config validates that enabling the regime selector causes no regression when MPC
#   never fires. Do NOT lower pp_max_speed_mps to force MPC at low speed — unstable.

control:
  lateral:
    pp_map_ff_enabled: false    # map feedforward off on s_loop; tight curves handled by PP geometry
    pp_map_ff_gain: 1.0         # (inactive while pp_map_ff_enabled=false; set for future reference)
  regime:
    enabled: true

trajectory:
  curve_scheduler_mode: phase_active
  reference_lookahead_entry_track_name: s_loop
  reference_lookahead_speed_table_entry:   # s_loop needs ~1m higher entry lookahead (tighter curves)
  - {speed_mps: 0.0,   lookahead_m: 7.0}
  - {speed_mps: 4.47,  lookahead_m: 8.0}
  - {speed_mps: 8.94,  lookahead_m: 9.0}
  - {speed_mps: 11.18, lookahead_m: 10.0}
  - {speed_mps: 13.41, lookahead_m: 10.0}
  curve_local_phase_distance_start_m: 10.0   # arm window: 10m before curve (base: 8.0)
  curve_local_commit_distance_ready_m: 8.0   # commit fires at 8m to curve (base: 3.0)
  mpc:
    mpc_horizon: 30           # longer horizon for curved track (base: 20)
    mpc_q_lat: 12.0           # stronger lateral error cost for tight s_loop curves (base: 10.0)
    mpc_q_heading: 8.0        # stronger heading cost (base: 5.0)
    mpc_r_steer: 0.25         # less steer penalty for tighter curves (base: 0.5)
    mpc_r_steer_rate: 0.8     # smoother transitions on curved track (base: 1.0)
    mpc_delta_rate_max: 0.25  # allow faster steering rate on tight curves (base: 0.15)
