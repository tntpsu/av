# S-loop track overlay — merges on top of config/av_stack_config.yaml at runtime.
#
# Only parameters that differ from base are listed here.
# Track: s_loop
# Usage:
#   ./start_av_stack.sh --config config/mpc_sloop.yaml \
#       --track-yaml tracks/s_loop.yml --duration 60
#
# NOTE: MPC does NOT activate on s_loop (cap-tracked speed 4-7 m/s, curvature guard blocks at κ>0.020).
# Explicit mpc_min_speed_mps override prevents brief MPC engagement on short straights.

# ── Remaining overlay keys (future task: auto-derive from track geometry) ──
# pp_map_ff_enabled: tight curves don't benefit from map FF; could auto-disable when κ_max > threshold
# commit_distance_ready_m: approach-length dependent; could derive from min straight segment length

control:
  lateral:
    pp_map_ff_enabled: false    # map feedforward off on s_loop; tight curves handled by PP geometry
  regime:
    mpc_min_speed_mps: 10.0     # Step 4: disable MPC on s_loop (speeds 4-7 m/s, tight curves)

trajectory:
  curve_local_commit_distance_ready_m: 8.0  # track-specific (base: 3.0); long s_loop approaches support early COMMIT
