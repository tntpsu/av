name: hairpin_15
road_width: 7.2
lane_line_width: 0.2
sample_spacing: 0.5          # finer spacing for R15 arcs (curvature κ=0.067)
loop: true
start_distance: 3.0
speed_limit_mph: 15.0        # hairpin circuit speed

# Tight S-loop layout: same angular structure as s_loop (heading sum = 0°)
# but with R15–R20 arcs to stress PP at its geometric limits.
# κ_max = 1/15 = 0.067 (vs s_loop κ_max = 1/40 = 0.025 — 2.7× tighter)
# Expected speed: 2–4 m/s on R15 arcs (cap-tracked).
# PP only — speed never reaches MPC threshold (10 m/s).
#
# Heading closure: -90 + 90 + 90 - 90 = 0° ✓
# Position closure: symmetric layout (second half mirrors first) ✓
#
# Straight lengths (80m, 120m): long enough for the curve scheduler to fully
# reset between consecutive arcs. At 4 m/s, 80m = 20s of straight — sufficient
# for COMMIT→exit→rearm cycle before the next curve entry.
segments:
  - type: straight
    length: 80
  - type: arc
    radius: 20
    angle_deg: 90
    direction: right
    speed_limit_mph: 12.0
  - type: arc
    radius: 15
    angle_deg: 90
    direction: left
    speed_limit_mph: 8.0
  - type: straight
    length: 120
  # Mirror: same arcs in same order → symmetric S-shape
  - type: arc
    radius: 15
    angle_deg: 90
    direction: left
    speed_limit_mph: 8.0
  - type: arc
    radius: 20
    angle_deg: 90
    direction: right
    speed_limit_mph: 12.0
  - type: straight
    length: 80
