# H4 — Lead accelerates away (highway_65)
# Lead at 30m arc-distance, starts slow (8 m/s) then ramps to 14 m/s (just below ego target).
# ACC first closes the gap, then maintains IDM equilibrium as lead accelerates.
# Expected: smooth gap convergence; no hunting; gap RMSE ≤ 1.0m after settle.
# base: tracks/highway_65.yml

name: highway_65
road_width: 7.2
lane_line_width: 0.2
sample_spacing: 1.0
loop: true
start_distance: 10.0
speed_limit_mph: 65.0
segments:
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: right
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0

lead_vehicle:
  enabled: true
  start_distance_m: 30.0
  lane_offset_m: 1.8
  speed_profile:
    type: accel_away
    speed_mps: 8.0
    stop_go_top_speed_mps: 14.0
