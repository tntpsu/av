# H4 — Lead accelerates away (highway_65)
# Lead at 30m arc-distance, starts slow (8 m/s) then ramps to 12 m/s (same as H2 equilibrium).
# Tests: ACC closes gap as lead accelerates (startup Δv=7), then settles at IDM equilibrium ~26m.
# 14 m/s final speed avoided: IDM eq_gap=46.6m (closing at 1 m/s); would need >120s to converge.
# At 12 m/s: eq_gap=26m, closing rate=3 m/s — converges within 90s.
# Expected: gap closes; no collision; RMSE ≤ 35m; TTC ≥ 2.0s.
# base: tracks/highway_65.yml

name: highway_65
road_width: 7.2
lane_line_width: 0.2
sample_spacing: 1.0
loop: true
start_distance: 10.0
speed_limit_mph: 65.0
segments:
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: right
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0

lead_vehicle:
  enabled: true
  start_distance_m: 30.0
  lane_offset_m: 1.8
  speed_profile:
    type: accel_away
    speed_mps: 8.0
    stop_go_top_speed_mps: 12.0
