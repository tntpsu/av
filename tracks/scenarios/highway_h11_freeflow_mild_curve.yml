# H11 — Free-flow mild-curve lateral reference (highway_65)
# No traffic actor. Dedicated lateral-quality reproducer for the full-speed highway
# mild-curve path.
# Expected:
# - free-flow run intent
# - no ACC lead following
# - transport/traffic contracts irrelevant
# - trajectory score should be used as the primary gate

name: highway_65
road_width: 7.2
