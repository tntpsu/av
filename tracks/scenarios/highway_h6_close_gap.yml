# H6 — Close-gap start (highway_65)
# Lead at 25m arc-distance (~22m initial gap), constant 5 m/s (very slow). Ego target 15 m/s.
# Tests ACC gap-holding behind a slow lead: ego accelerates, IDM slows to match, gap converges.
# Original 10m start caused vehicles to spawn touching (gap=0.1m), physics-locking both at 0 m/s.
# Expected: 0 collisions; TTC min ≥ 2.0s; detection ≥ 95%.
# base: tracks/highway_65.yml

name: highway_65
road_width: 7.2
lane_line_width: 0.2
sample_spacing: 1.0
loop: true
start_distance: 10.0
speed_limit_mph: 65.0
segments:
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: right
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0

lead_vehicle:
  enabled: true
  start_distance_m: 25.0
  lane_offset_m: 1.8
  speed_profile:
    type: constant
    speed_mps: 5.0
