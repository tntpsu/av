# H8 — Curve catch-up (highway_65)
# Lead at 200m arc-distance, slower 10 m/s. Ego target 15 m/s (5 m/s closing speed).
# Lead is beyond radar range at start (~197m); ego drives free until ~27s then ACC engages near S-curve.
# Tests ACC engage + curve speed governor coexistence while both vehicles approach the R500 S-curve.
# Expected: smooth ACC engage at ~60m gap; no hunting; jerk P95 ≤ 4.0.
# base: tracks/highway_65.yml

name: highway_65
road_width: 7.2
lane_line_width: 0.2
sample_spacing: 1.0
loop: true
start_distance: 10.0
speed_limit_mph: 65.0
segments:
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: right
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0

lead_vehicle:
  enabled: true
  start_distance_m: 200.0
  lane_offset_m: 1.8
  speed_profile:
    type: constant
    speed_mps: 10.0
