# H2 — Steady following (highway_65)
# Lead at 30m arc-distance (27m initial gap, within 60m radar range), constant 12 m/s.
# Ego target 15 m/s (proven stable; avoids PP↔LMPC chatter). IDM holds ~22.5m gap (1.5s headway at 15 m/s).
# Expected: ACC active; gap RMSE ≤ 0.5m; TTC ≥ 2.0s; 0 collisions.
# base: tracks/highway_65.yml

name: highway_65
road_width: 7.2
lane_line_width: 0.2
sample_spacing: 1.0
loop: true
start_distance: 10.0
speed_limit_mph: 65.0
segments:
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: right
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0

lead_vehicle:
  enabled: true
  start_distance_m: 30.0
  lane_offset_m: 1.8
  speed_profile:
    type: constant
    speed_mps: 12.0
