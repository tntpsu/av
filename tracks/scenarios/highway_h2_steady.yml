# H2 — Steady following (highway_65)
# Lead at 30m arc-distance (27m initial gap, within 150m radar range), constant 12 m/s.
# Ego target 15 m/s (free-flow). IDM equilibrium gap ≈ 26m (not target_gap 20m):
#   eq_gap = s*(v,0) / sqrt(1 - (v/v0)^4) = 20m / sqrt(1-(12/15)^4) ≈ 26m.
# Startup: ego from rest → lead pulls to ~79m before ACC closes gap over ~90s.
# Expected: ACC active; gap RMSE ≤ 35m (startup-inclusive); TTC ≥ 2.0s; 0 collisions.
# base: tracks/highway_65.yml

name: highway_65
road_width: 7.2
lane_line_width: 0.2
sample_spacing: 1.0
loop: true
start_distance: 10.0
speed_limit_mph: 65.0
segments:
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: right
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0

lead_vehicle:
  enabled: true
  start_distance_m: 30.0
  lane_offset_m: 1.8
  speed_profile:
    type: constant
    speed_mps: 12.0
