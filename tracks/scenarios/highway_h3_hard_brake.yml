# H3 — Hard brake on straight (highway_65)
# Lead at 30m arc-distance, constant 12 m/s until t=70s then hard brake → 5 m/s at 3 m/s².
# ACC needs ~65s to close from startup gap to IDM equilibrium (~28m). brake_at_time_s=70
# fires after full convergence. brake_to_speed_mps=5.0 (Δv=7 m/s at onset).
# EMERGENCY_BRAKE fires when gap < 1.5×ego (fires at gap~13.5m). With the fixed EB
# compounding (v_target_prev - 4×dt instead of ego - 4×dt), target compounds downward
# ~0.133m/s per frame → growing speed error → proportional braking ramps up.
# Expected: IDM decelerates to 5 m/s; TTC min ≥ 2.0s; no collision; gap converges to ~9.5m.
# base: tracks/highway_65.yml

name: highway_65
road_width: 7.2
lane_line_width: 0.2
sample_spacing: 1.0
loop: true
start_distance: 10.0
speed_limit_mph: 65.0
segments:
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: right
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0

lead_vehicle:
  enabled: true
  start_distance_m: 30.0
  lane_offset_m: 1.8
  speed_profile:
    type: hard_brake
    speed_mps: 12.0
    brake_at_time_s: 70.0
    brake_to_speed_mps: 5.0
