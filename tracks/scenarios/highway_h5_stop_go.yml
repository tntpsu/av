# H5 — Stop-and-go (highway_65)
# Lead at 20m arc-distance (17m initial gap), sinusoidal 0↔8 m/s over 20s period.
# Original 12 m/s / 10s caused TTC=1.45s failures: peak decel=12×2π/10=7.5 m/s² > IDM bandwidth.
# At 8 m/s / 20s: peak decel=8×2π/20=2.51 m/s² → IDM has 3× more time to respond.
# Detection was also failing at 12 m/s / 10s (lead reached 148m, near radar limit).
# Ego target 15 m/s; ACC follows stop-and-go; CUTOUT fires when ego < 5 m/s (expected).
# Expected: TTC min ≥ 2.0s; 0 collisions; detection ≥ 95% over ACC-active frames.
# base: tracks/highway_65.yml

name: highway_65
road_width: 7.2
lane_line_width: 0.2
sample_spacing: 1.0
loop: true
start_distance: 10.0
speed_limit_mph: 65.0
segments:
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: right
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 550
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0
  - type: straight
    length: 400
    speed_limit_mph: 65.0
  - type: arc
    radius: 500
    angle_deg: 90
    direction: left
    speed_limit_mph: 65.0

lead_vehicle:
  enabled: true
  start_distance_m: 20.0
  lane_offset_m: 1.8
  speed_profile:
    type: stop_go
    stop_go_top_speed_mps: 8.0
    stop_go_period_s: 20.0
